appId: ai.marswave.colamd
productName: ColaMD
copyright: Copyright © 2024-2026 marswave.ai

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*

mac:
  target:
    - dmg
    - zip
  category: public.app-category.productivity
  icon: resources/icon.icns

win:
  target:
    - nsis
  icon: resources/icon.ico

linux:
  target:
    - AppImage
    - deb
  category: Office
  icon: resources

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
